name: Gamegoo Socket Server DEV CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64, macmini]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create env file
        run: |
          mkdir -p ~/apps/gamegoo/env
          cat > ~/apps/gamegoo/env/.env.socket.dev <<EOF
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SOCKETIO_URL=${{ secrets.QA_SOCKETIO_URL }}
          API_SERVER_URL=${{ secrets.QA_API_SERVER_URL }}
          NODE_SERVER_URL=${{ secrets.QA_NODE_SERVER_URL }}
          EOF

      - name: Prepare Docker config for CI
        run: |
          mkdir -p "$RUNNER_TEMP/docker-config"
          cat > "$RUNNER_TEMP/docker-config/config.json" <<EOF
          {
            "auths": {}
          }
          EOF

      - name: Stop old container
        run: |
          docker rm -f gamegoo-socket-dev || true

      - name: Install dependencies
        run: npm install

      - name: Build Socket image
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/docker-config
        run: |
          docker build -t gamegoo-socket:dev -f Dockerfile-dev .

      - name: Run Socket container
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/docker-config
        run: |
          mkdir -p ~/apps/gamegoo/logs/socket-dev
          docker run -d \
            -p 3001:3000 \
            --name gamegoo-socket-dev \
            --restart always \
            -v ~/apps/gamegoo/logs/socket-dev:/app/logs \
            --env-file ~/apps/gamegoo/env/.env.socket.dev \
            gamegoo-socket:dev

      - name: Verify container is running
        run: |
          sleep 10
          docker ps
          docker logs --tail=200 gamegoo-socket-dev || true
          docker inspect gamegoo-socket-dev --format='{{.State.Status}} {{.State.ExitCode}} {{.State.Error}}'

      - name: Send Discord notification on failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content":"🚨 **Gamegoo Socket DEV 서버 배포 실패** 🚨\nWorkflow: Gamegoo Socket Server DEV CI/CD\nBranch: main\nCommit: ${{ github.sha }}\nRepo: ${{ github.repository }}"}' \
          ${{ secrets.DISCORD_WEBHOOK_BACK_DEPLOY }}
